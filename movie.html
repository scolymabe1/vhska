<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>VHSka</title>

	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
	<link href="./output.css" rel="stylesheet">
</head>

<body class="bg-neutral-900 text-white font-montserrat min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-neutral-900 shadow-[1px_5px_10px_rgb(20,20,20)]">
        <div class="container mx-auto grid grid-cols-[auto_1fr_400px] items-center gap-10 px-4 py-3">

            <a href="." class="flex h-9">
                <img src="images/logo.png" alt="VHSka">
            </a>

            <nav>
                <ul class="flex gap-4">
                    <li>
                        <a href="films.html" class="transition-colors hover:text-gray-300">
                            ФИЛЬМЫ
                        </a>
                    </li>

                    <li>
                        <a href="series.html" class="transition-colors hover:text-gray-300">
                            СЕРИАЛЫ
                        </a>
                    </li>

                    <li>
                        <a href="cartoons.html" class="transition-colors hover:text-gray-300">
                            МУЛЬТФИЛЬМЫ
                        </a>
                    </li>
                </ul>
            </nav>

            <form action="search.html" method="get" class="flex items-center gap-2 rounded-lg bg-neutral-800 px-4 py-2">
                <input
                    name="q"
                    type="text"
                    placeholder="Поиск..."
                    class="w-full bg-transparent text-white outline-none placeholder:text-sm placeholder:text-neutral-500"
                >

                <button
                    type="submit"
                    class="flex aspect-square items-center justify-center rounded-full bg-neutral-700 px-3 text-neutral-400 transition-opacity hover:opacity-80"
                >
                    +
                </button>
            </form>

        </div>
    </header>

    <div class="container mx-auto py-10 px-4" x-data="moviePage" x-init="init()">
    
    <!-- Кнопка назад -->
    <a href="index.html" class="text-neutral-400 hover:text-white transition mb-6 inline-block">← Назад</a>

    <div class="grid grid-cols-[300px_1fr] gap-10">
        
        <!-- Левая часть: Постер -->
        <div>
            <img :src="movie?.poster" class="w-full rounded-xl shadow-2xl">
            <div class="mt-4 flex gap-2">
                <span class="bg-white text-black px-2 py-1 rounded font-bold" x-text="movie?.kinopoisk"></span>
                <span class="bg-neutral-800 text-white px-2 py-1 rounded" x-text="movie?.year"></span>
            </div>
        </div>

        <!-- Правая часть: Описание и Плеер -->
        <div>
            <h1 class="text-5xl font-black mb-4" x-text="movie?.name"></h1>
            <p class="text-gray-300 mb-8 leading-relaxed" x-text="movie?.description"></p>

            <!-- Сам плеер -->
            <!-- x-show скрывает квадрат малевича, пока ссылка не загрузилась -->
            <iframe
                x-show="iframeLink"
                class="w-full aspect-video rounded-xl shadow-2xl bg-black"
                :src="iframeLink"
                allowfullscreen
            ></iframe>
        </div>

    </div>
</div>

    <script src="./js/movie.js"></script>
</body>
</html>
