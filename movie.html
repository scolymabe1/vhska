<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>VHSka</title>

	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">


	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Montserrat+Alternates:wght@100..900&display=swap" rel="stylesheet">
	<link href="./output.css" rel="stylesheet">
</head>

<body class="bg-neutral-900 text-white font-montserrat min-h-screen">

	<!-- HEADER -->
	<header class="sticky top-0 z-50 bg-neutral-900 shadow-[1px_5px_10px_rgb(20,20,20)]">
		<div class="container mx-auto grid grid-cols-[auto_auto] lg:grid-cols-[auto_1fr_400px] items-center gap-10 px-4 py-3">

			<a href="." class="flex h-9">
				<img src="images/logo.png" alt="VHSka">
			</a>

			<nav class="hidden lg:flex">
				<ul class="flex gap-4">
					<li>
						<a href="category.html?cat=movies" class="transition-colors hover:text-gray-300">ФИЛЬМЫ</a>
					</li>
					<li>
						<a href="category.html?cat=series" class="transition-colors hover:text-gray-300">СЕРИАЛЫ</a>
					</li>
					<li>
						<a href="category.html?cat=cartoons" class="transition-colors hover:text-gray-300">МУЛЬТФИЛЬМЫ</a>
					</li>
				</ul>
			</nav>

			<form action="search.html" method="get" class="flex items-center gap-2 rounded-lg bg-neutral-800 px-4 py-2">
				<input
					name="q"
					type="text"
					placeholder="Поиск..."
					class="w-full bg-transparent text-white outline-none placeholder:text-sm placeholder:text-neutral-500"
				>
				<button
					type="submit"
					class="flex aspect-square items-center justify-center rounded-full bg-neutral-700 px-3 text-neutral-400 transition-opacity hover:opacity-80"
				>
					<span>➔</span>
				</button>
			</form>

		</div>
	</header>

	<main class="py-10" x-data="moviePage" x-init="init()">
		<section class="container mx-auto px-4">
			<a href="index.html" class="text-neutral-400 hover:text-white transition mb-6 inline-block">← Главная</a>
		</section>

		<!-- Ошибка загрузки фильма -->
		<template x-if="loadError">
			<section class="container mx-auto px-4">
				<div class="rounded-xl bg-neutral-800 p-8 text-center">
					<h2 class="text-2xl font-bold mb-4">Не удалось загрузить информацию о фильме</h2>
					<p class="text-neutral-400 mb-6">Возможно сервер временно недоступен или фильм не найден.</p>
					<a href="index.html" class="inline-block rounded-lg bg-white text-black px-6 py-3 font-medium">Вернуться на главную</a>
				</div>
			</section>
		</template>

		<!-- Содержимое страницы (показывается, когда фильм успешно загружен) -->
		<template x-if="!loadError && movie">
			<section class="container mx-auto px-4">
				<div class="flex flex-col gap-8">
				<div class="grid lg:grid-cols-[320px_1fr] gap-8 items-start">
					<!-- Постер -->
					<div class="relative overflow-hidden rounded-xl shadow-2xl bg-neutral-800">
						<template x-if="movie">
							<img :src="movie.poster || 'images/no_poster.png'" @error="event.target.src='images/no_poster.png'" class="object-cover w-full h-full min-h-[480px] max-h-[720px]">
						</template>

						<div class="absolute top-0 p-4 flex justify-between w-full gap-2">
							<span class="text-sm font-medium text-white w-fit h-fit px-3 py-1 rounded-lg bg-black/30 backdrop-blur ring-1 ring-white/10" x-text="movie.cleanType ? (movie.cleanType || '') : ''"></span>
							<span class="text-sm font-medium text-white w-fit h-fit px-3 py-1 rounded-lg bg-black/30 backdrop-blur ring-1 ring-white/10" x-text="movie.cleanAge || '18+'">18+</span>
						</div>
						<div class="absolute bottom-0 p-4 flex justify-between w-full gap-2">
							<span class="text-sm font-medium text-white w-fit h-fit px-3 py-1 rounded-lg bg-black/30 backdrop-blur ring-1 ring-white/10" x-text="movie.cleanRating || '10'">18+</span>
							<span class="text-sm font-medium text-white w-fit h-fit px-3 py-1 rounded-lg bg-black/30 backdrop-blur ring-1 ring-white/10" x-text="movie.name ? (movie.year || '') : ''"></span>
						</div>

						<!-- <div class="absolute bottom-4 left-4 right-4">
							<div class="flex items-center gap-3"> -->
								<!-- <a :href="iframeLink" x-show="iframeLink" class="inline-block rounded-full bg-white px-8 py-3 text-black font-bold hover:opacity-90">Смотреть</a> -->
								<!-- <span x-show="!iframeLink" class="inline-block rounded-full bg-white/10 px-4 py-2 text-neutral-400">Плеер временно недоступен</span>
								<div class="ml-auto text-sm text-neutral-300" x-text="movie.cleanRating ? '★ ' + movie.cleanRating : ''"></div>
							</div>
						</div> -->
					</div> 

					<!-- Информация -->
					<div class="text-neutral-100">
						<h1 class="text-4xl font-black mb-4" x-text="movie.name">Название</h1>
						<p class="text-gray-300 leading-relaxed mb-6" x-text="movie.description">Описание временно отсутствует.</p>
					<!-- 
						<ul class="text-neutral-400 space-y-2">
							<li><strong class="text-white">Год:</strong> <span x-text="movie.year || '—'"></span></li>
							<li><strong class="text-white">Режиссёр:</strong> <span>—</span></li>
							<li><strong class="text-white">Жанры:</strong> <span>—</span></li>
						</ul> -->

					</div>
				</div>

				<div>
					<iframe
						x-show="iframeLink"
						class="w-full aspect-video rounded-xl shadow-2xl bg-black"
						:src="iframeLink"
						allowfullscreen
					></iframe>
				</div>

				<!-- Похожие фильмы -->
				<template x-if="similars && similars.length > 0">
					<section class="container mx-auto mt-10">
						<h2 class="group flex w-fit items-center gap-1 mb-6 text-2xl font-bold">Похожие фильмы</h2>
						<div class="grid grid-cols-2 lg:grid-cols-5 gap-6">
							<template x-for="film in similars" :key="film.kinopoiskId">
									<a :href="'movie.html?id=' + film.kinopoiskId" class="group relative aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
										<img :src="film.posterUrlPreview || 'images/no_poster.png'" :alt="film.nameRu" @error="event.target.src='images/no_poster.png'" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

										<div class="absolute inset-0 bg-linear-to-t from-black via-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100"></div>

										<div class="absolute left-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm">
											<span x-text="film.cleanType"></span>
										</div>

										<div class="relative flex h-full flex-col justify-end p-4 text-center opacity-0 transition-all duration-500 group-hover:opacity-100">
											<h3 class="text-lg font-bold leading-tight" x-text="film.nameRu || film.nameOriginal || 'Без названия'"></h3>
										</div>
									</a>
							</template>
							<a href="." class="group relative flex lg:hidden justify-center items-center aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
								<p>На главную</p>
							</a>
						</div>
					</section>
				</template>
			</div>
		</section>

		</template>

	</main>

	<script src="./js/config.js"></script>
	<script src="./js/movie.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

</body>
</html>
