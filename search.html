<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>VHSka</title>

	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">


	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Montserrat+Alternates:wght@100..900&display=swap" rel="stylesheet">
	<link href="./output.css" rel="stylesheet">
</head>

<body class="flex min-h-screen flex-col bg-neutral-900 font-montserrat text-white">

    <!-- HEADER (копия из index.html для консистентности) -->
    <header class="sticky top-0 z-50 bg-neutral-900 shadow-[1px_5px_10px_rgb(20,20,20)]">
		<div class="container mx-auto grid grid-cols-[auto_auto] md:grid-cols-[auto_1fr_400px] items-center gap-10 px-4 py-3">

			<a href="." class="flex h-9">
				<img src="images/logo.png" alt="VHSka">
			</a>

			<nav class="hidden md:flex">
				<ul class="flex gap-4">
					<li>
						<a href="category.html?cat=movies" class="transition-colors hover:text-gray-300">ФИЛЬМЫ</a>
					</li>
					<li>
						<a href="category.html?cat=series" class="transition-colors hover:text-gray-300">СЕРИАЛЫ</a>
					</li>
					<li>
						<a href="category.html?cat=cartoons" class="transition-colors hover:text-gray-300">МУЛЬТФИЛЬМЫ</a>
					</li>
				</ul>
			</nav>

			<form action="search.html" method="get" class="flex items-center gap-2 rounded-lg bg-neutral-800 px-4 py-2">
				<input
					name="q"
					type="text"
					placeholder="Поиск..."
					class="w-full bg-transparent text-white outline-none placeholder:text-sm placeholder:text-neutral-500"
				>
				<button
					type="submit"
					class="flex aspect-square items-center justify-center rounded-full bg-neutral-700 px-3 text-neutral-400 transition-opacity hover:opacity-80"
				>
					<span>➔</span>
				</button>
			</form>

		</div>
	</header>

    <main class="grow" x-data="searchPage" x-init="init()">

        <section class="container mx-auto px-4 py-10">
            <h1 class="text-3xl font-bold mb-2">Результаты поиска</h1>
            <p class="text-neutral-400 mb-6" x-text="query ? 'По запросу: «' + query + '»' : 'Введите запрос в поиске'"></p>

            <template x-if="isLoading">
                <div class="flex justify-center items-center py-10 text-xl text-neutral-400">
                    <div class="animate-pulse">Идёт поиск...</div>
                </div>
            </template>

            <template x-if="!isLoading && results.length === 0">
                <div class="text-neutral-500 py-10">Ничего не найдено.</div>
            </template>

            <template x-if="!isLoading && results.length > 0">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-6">
                    <template x-for="film in results" :key="film.kinopoiskId">
                        <a :href="'movie.html?id=' + film.kinopoiskId" class="group relative aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
                            <img :src="film.posterUrlPreview || 'images/no_poster.png'" :alt="film.nameRu" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

                            <div class="absolute left-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm">
                                <span x-text="film.cleanType"></span>
                            </div>

                            <div class="absolute right-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm font-bold">
                                <span x-text="film.cleanRating"></span>
                            </div>

                            <div class="relative flex h-full flex-col justify-end p-4 text-center opacity-0 transition-all duration-500 group-hover:opacity-100">
                                <h3 class="text-lg font-bold leading-tight" x-text="film.nameRu || film.nameOriginal || 'Без названия'"></h3>
                                <p class="text-xs text-neutral-400 mt-1 truncate" x-text="film.cleanGenres"></p>
                                <p class="text-sm text-gray-300 mt-1" x-text="film.year"></p>
                            </div>
                        </a>
                    </template>
                </div>
            </template>

        </section>

    </main>

    <footer class="border-t border-white/10 py-10 text-center text-gray-500">
        &copy; 2026 VHSka. Все права защищены.
    </footer>

    <!-- СКРИПТЫ -->
    <script src="./js/config.js"></script>
    <script src="./js/search.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <script>
        // Подставляем текущий запрос в поле поиска при загрузке страницы
        (function(){
            const q = new URLSearchParams(location.search).get('q') || '';
            const inp = document.querySelector('input[name="q"]');
            if (inp) inp.value = q;
        })();
    </script>

</body>
</html>
