<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>VHSka</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Montserrat+Alternates:wght@100..900&display=swap" rel="stylesheet">
	<link href="./output.css" rel="stylesheet">
</head>

<body class="flex min-h-screen flex-col bg-neutral-900 font-montserrat text-white">

	<!-- HEADER -->
	<header class="sticky top-0 z-50 bg-neutral-900 shadow-[1px_5px_10px_rgb(20,20,20)]">
		<div class="container mx-auto grid grid-cols-[auto_1fr_400px] items-center gap-10 px-4 py-3">

			<a href="." class="flex h-9">
				<img src="images/logo.png" alt="VHSka">
			</a>

			<nav>
				<ul class="flex gap-4">
					<li>
						<a href="category.html?cat=movies" class="transition-colors hover:text-gray-300">ФИЛЬМЫ</a>
					</li>
					<li>
						<a href="category.html?cat=series" class="transition-colors hover:text-gray-300">СЕРИАЛЫ</a>
					</li>
					<li>
						<a href="category.html?cat=cartoons" class="transition-colors hover:text-gray-300">МУЛЬТФИЛЬМЫ</a>
					</li>
				</ul>
			</nav>

			<form action="search.html" method="get" class="flex items-center gap-2 rounded-lg bg-neutral-800 px-4 py-2">
				<input
					name="q"
					type="text"
					placeholder="Поиск..."
					class="w-full bg-transparent text-white outline-none placeholder:text-sm placeholder:text-neutral-500"
				>
				<button
					type="submit"
					class="flex aspect-square items-center justify-center rounded-full bg-neutral-700 px-3 text-neutral-400 transition-opacity hover:opacity-80"
				>
					<span>➔</span>
				</button>
			</form>

		</div>
	</header>

	<main class="grow" x-data="homePage">

		<!-- HERO BANNER (ДИНАМИЧЕСКИЙ) -->
		<template x-if="heroMovie">
			<section class="relative h-[80vh] overflow-hidden">
				<!-- Градиент 1: Снизу вверх (плавный переход в черный цвет сайта) -->
				<div class="absolute inset-0 bg-gradient-to-t from-neutral-900/90 via-neutral-900/40 to-transparent z-10"></div>

				<!-- Градиент 2: Слева направо (создает глубокую темную шторку строго под текстом) -->
				<div class="absolute inset-0 bg-gradient-to-r from-neutral-900/90 via-neutral-950/50 to-transparent z-10 md:w-2/3"></div>

				<!-- Подставляем постер случайного фильма на фон -->
				<img :src="heroMovie.posterUrl || heroMovie.posterUrlPreview || 'images/no_poster.png'" :alt="heroMovie.nameRu" @error="event.target.src='images/no_poster.png'" class="absolute inset-0 h-full w-full object-cover">

				<div class="container mx-auto px-4 select-none relative z-20 h-full">
					<div class="absolute bottom-20 flex max-w-2xl flex-col gap-10">
						<div class="flex flex-col gap-4">
						
							<div class="flex gap-2">
								<!-- Возрастной рейтинг -->
								<div class="w-fit rounded-full bg-white px-3 py-1">
									<span class="text-sm font-medium text-black" x-text="heroMovie.ratingAgeLimits ? heroMovie.ratingAgeLimits.replace('age', '') + '+' : '0+'"></span>
								</div>

								<!-- Отформатированный тип медиа (Фильм) -->
								<div class="w-fit rounded-full bg-black/30 px-3 py-1 backdrop-blur ring-1 ring-white/10">
									<span class="text-sm font-medium text-white" x-text="heroMovie.cleanType"></span>
								</div>

								<!-- Рейтинг фильма на баннере -->
								<div class="w-fit rounded-full bg-amber-500/20 px-3 py-1 backdrop-blur ring-1 ring-amber-500/30">
									<span class="text-sm font-bold text-amber-400" x-text="'★ ' + heroMovie.cleanRating"></span>
								</div>
							</div>

							<!-- Название случайного фильма -->
							<h2 class="text-5xl font-black md:text-7xl leading-tight text-white" x-text="heroMovie.nameRu || heroMovie.nameOriginal"></h2>
							
							<!-- Описание фильма из JSON -->
							<p class="leading-relaxed text-neutral-100 line-clamp-4" x-text="heroMovie.description || 'Описание временно отсутствует.'"></p>
							
							<!-- Жанры фильма -->
							<p class="text-sm text-neutral-400 font-medium" x-text="'Жанры: ' + heroMovie.cleanGenres"></p>
						</div>

						<!-- Кнопка «Смотреть» сразу ведет на страницу этого фильма с его ID -->
						<a :href="'movie.html?id=' + heroMovie.kinopoiskId" class="group w-fit rounded-full bg-white px-14 py-4 transition-all duration-300 hover:bg-black text-center">
							<span class="text-xl font-bold text-black transition-all group-hover:text-white">
								Смотреть
							</span>
						</a>

					</div>
				</div>
			</section>
		</template>

		<!-- Лоадер во время загрузки данных со всех трех API-эндпоинтов -->
		<template x-if="isLoading">
			<div class="flex justify-center items-center py-20 text-xl text-neutral-400">
				<div class="animate-pulse">Загрузка...</div>
			</div>
		</template>

		<!-- ОСНОВНОЙ КОНТЕНТ (Показывается только когда данные загружены) -->
		<template x-if="!isLoading">
			<div>

				<!-- FILMS SECTION -->
				<section class="container mx-auto px-4 py-10">
					<!-- Стрелочки ведут на нашу универсальную страницу каталога -->
					<a href="category.html?cat=movies" class="group flex w-fit items-center gap-1 mb-6 text-2xl font-bold hover:opacity-80 transition-all duration-300">
						Фильмы
						<ul class="relative flex transition-all duration-500 group-hover:translate-x-1">
							<li class="font-medium text-neutral-600">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-500 group-hover:translate-x-3 group-hover:opacity-60">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-700 group-hover:translate-x-6 group-hover:opacity-40">&gt;</li>
						</ul>
					</a>

					<div class="grid grid-cols-5 gap-6">
						<!-- Перебираем массив movies из скрипта home.js -->
						<template x-for="film in movies" :key="film.kinopoiskId">
							<!-- Обернули в тег <a> для возможности перехода на страницу фильма -->
							<a :href="'movie.html?id=' + film.kinopoiskId" class="group relative aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
								
								<!-- Постер фильма -->
								<img :src="film.posterUrlPreview || 'images/no_poster.png'" :alt="film.nameRu" @error="event.target.src='images/no_poster.png'" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

								<!-- Левая верхняя плашка: Тип (Фильм / Сериал) -->
								<div class="absolute left-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm">
									<span x-text="film.cleanType"></span>
								</div>

								<!-- Правая верхняя плашка: Рейтинг -->
								<div class="absolute right-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm font-bold">
									<span x-text="film.cleanRating"></span>
								</div>

								<!-- Затемнение при наведении -->
								<div class="absolute inset-0 bg-linear-to-t from-black via-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100"></div>

								<!-- Текстовый блок, выплывающий снизу -->
								<div class="relative flex h-full flex-col justify-end p-4 text-center opacity-0 transition-all duration-500 group-hover:opacity-100">

									<!-- Название фильма -->
									<h3 class="text-lg font-bold leading-tight" x-text="film.nameRu || film.nameOriginal || 'Без названия'"></h3>

									<!-- Год выпуска -->
									<p class="text-sm text-gray-300 mt-1" x-text="film.year + ' г.'"></p>

									<!-- Жанры (выводятся снизу под годом) -->
									<p class="text-xs text-neutral-400 mt-1 truncate" x-text="film.cleanGenres"></p>

								</div>
							</a>
						</template>
					</div>
				</section>

				<!-- СЕКЦИЯ КАТЕГОРИЙ (5 В РЯД) -->
				<section class="container mx-auto px-4 py-10">
					<h2 class="group flex w-fit items-center gap-1 py-10 text-2xl font-bold">
						Под вайб
					</h2>
					<div class="grid grid-cols-5 gap-6">
						<!-- Категория 1: Популярное -->
						<a href="category.html?cat=popular" class="group relative flex aspect-[5/6] items-center justify-center overflow-hidden rounded-xl bg-neutral-800 shadow-lg ring-1 ring-white/10 transition-all duration-500 hover:-translate-y-1 hover:ring-white/20">
							<!-- Фоновое изображение категории -->
							<img src="https://mixnews.lv/wp-content/uploads/2026/01/10/luchshie-filmy-2026-samye-ozhidaemye-premery-768x432.webp" class="absolute inset-0 h-full w-full object-cover opacity-50 transition-all duration-500 group-hover:scale-110 group-hover:opacity-70" alt="Популярное">
							
							<!-- Тёмная подложка -->
							<div class="absolute inset-0 bg-neutral-950/60 backdrop-blur-[2px] transition-all duration-300 group-hover:bg-neutral-950/30"></div>

							<!-- Векторный текст из Figma -->
							<img 
								src="images/categories/ПОПУЛЯРНОЕ.svg" 
								alt="Популярное" 
								class="relative z-10 w-8/12 max-h-6 shrink-0 object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)]"
							>
						</a>

						<!-- Категория 2: Топ 250 -->
						<a href="category.html?cat=top250-movies" class="group relative flex aspect-[5/6] items-center justify-center overflow-hidden rounded-xl bg-neutral-800 shadow-lg ring-1 ring-white/10 transition-all duration-500 hover:-translate-y-1 hover:ring-white/20">
							<!-- Фоновое изображение категории -->
							<img src="https://avatars.mds.yandex.net/get-kinopoisk-post-img/1539913/e6dd24cbe07ab6ecd0d31dedd58b870f/960x540" class="absolute inset-0 h-full w-full object-cover opacity-50 transition-all duration-500 group-hover:scale-110 group-hover:opacity-70" alt="Топ 250">
							
							<!-- Тёмная подложка -->
							<div class="absolute inset-0 bg-neutral-950/60 backdrop-blur-[2px] transition-all duration-300 group-hover:bg-neutral-950/30"></div>

							<!-- Векторный текст из Figma -->
							<img 
								src="images/categories/ТОП 250.svg" 
								alt="Топ 250" 
								class="relative z-10 w-8/12 max-h-6 shrink-0 object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)]"
							>
						</a>

						<!-- Категория 3: Комиксы -->
						<a href="category.html?cat=comics-theme" class="group relative flex aspect-[5/6] items-center justify-center overflow-hidden rounded-xl bg-neutral-800 shadow-lg ring-1 ring-white/10 transition-all duration-500 hover:-translate-y-1 hover:ring-white/20">
							<!-- Фоновое изображение категории -->
							<img src="https://i.pinimg.com/originals/d6/57/a4/d657a48442d85023b6960c1cd1e0464e.jpg" class="absolute inset-0 h-full w-full object-cover opacity-50 transition-all duration-500 group-hover:scale-110 group-hover:opacity-70" alt="Комиксы">
							
							<!-- Тёмная подложка -->
							<div class="absolute inset-0 bg-neutral-950/60 backdrop-blur-[2px] transition-all duration-300 group-hover:bg-neutral-950/30"></div>

							<!-- Векторный текст из Figma -->
							<img 
								src="images/categories/КОМИКСЫ.svg" 
								alt="Комиксы" 
								class="relative z-10 w-8/12 max-h-6 shrink-0 object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)]"
							>
						</a>

						<!-- Категория 4: Семейное -->
						<a href="category.html?cat=family" class="group relative flex aspect-[5/6] items-center justify-center overflow-hidden rounded-xl bg-neutral-800 shadow-lg ring-1 ring-white/10 transition-all duration-500 hover:-translate-y-1 hover:ring-white/20">
							<!-- Фоновое изображение категории -->
							<img src="https://s15.stc.all.kpcdn.net/afisha/msk/wp-content/uploads/sites/5/2024/10/film-dzhumandzhi.jpg" class="absolute inset-0 h-full w-full object-cover opacity-50 transition-all duration-500 group-hover:scale-110 group-hover:opacity-70" alt="Семейное">
							
							<!-- Тёмная подложка -->
							<div class="absolute inset-0 bg-neutral-950/60 backdrop-blur-[2px] transition-all duration-300 group-hover:bg-neutral-950/30"></div>

							<!-- Векторный текст из Figma -->
							<img 
								src="images/categories/СЕМЕЙНОЕ.svg" 
								alt="Семейное" 
								class="relative z-10 w-8/12 max-h-6 shrink-0 object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)]"
							>
						</a>

						<!-- Категория 5: Зомби -->
						<a href="category.html?cat=zombie-theme" class="group relative flex aspect-[5/6] items-center justify-center overflow-hidden rounded-xl bg-neutral-800 shadow-lg ring-1 ring-white/10 transition-all duration-500 hover:-translate-y-1 hover:ring-white/20">
							<!-- Фоновое изображение категории -->
							<img src="https://i.ytimg.com/vi/8d1bijyuVj8/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDOiJPJo8tn-UGnNPXxox5M6MvtZw" class="absolute inset-0 h-full w-full object-cover opacity-50 transition-all duration-500 group-hover:scale-110 group-hover:opacity-70" alt="Про зомби">
							
							<!-- Тёмная подложка -->
							<div class="absolute inset-0 bg-neutral-950/60 backdrop-blur-[2px] transition-all duration-300 group-hover:bg-neutral-950/30"></div>

							<!-- Векторный текст из Figma -->
							<img 
								src="images/categories/ПРО ЗОМБИ.svg" 
								alt="Про зомби" 
								class="relative z-10 w-8/12 max-h-6 shrink-0 object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)]"
							>
						</a>

					</div>
				</section>
				<!-- SERIES SECTION -->
				<section class="container mx-auto px-4 py-10">
					<!-- Стрелочки ведут на нашу универсальную страницу каталога -->
					<a href="category.html?cat=series" class="group flex w-fit items-center gap-1 mb-6 text-2xl font-bold hover:opacity-80 transition-all duration-300">
						Сериалы
						<ul class="relative flex transition-all duration-500 group-hover:translate-x-1">
							<li class="font-medium text-neutral-600">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-500 group-hover:translate-x-3 group-hover:opacity-60">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-700 group-hover:translate-x-6 group-hover:opacity-40">&gt;</li>
						</ul>
					</a>

					<div class="grid grid-cols-5 gap-6">
						<!-- Перебираем массив movies из скрипта home.js -->
						<template x-for="film in series" :key="film.kinopoiskId">
							<!-- Обернули в тег <a> для возможности перехода на страницу фильма -->
							<a :href="'movie.html?id=' + film.kinopoiskId" class="group relative aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
								
								<!-- Постер фильма -->
								<img :src="film.posterUrlPreview || 'images/no_poster.png'" :alt="film.nameRu" @error="event.target.src='images/no_poster.png'" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

								<!-- Левая верхняя плашка: Тип (Фильм / Сериал) -->
								<div class="absolute left-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm">
									<span x-text="film.cleanType"></span>
								</div>

								<!-- Правая верхняя плашка: Рейтинг -->
								<div class="absolute right-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm font-bold">
									<span x-text="film.cleanRating"></span>
								</div>

								<!-- Затемнение при наведении -->
								<div class="absolute inset-0 bg-linear-to-t from-black via-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100"></div>

								<!-- Текстовый блок, выплывающий снизу -->
								<div class="relative flex h-full flex-col justify-end p-4 text-center opacity-0 transition-all duration-500 group-hover:opacity-100">

									<!-- Название фильма -->
									<h3 class="text-lg font-bold leading-tight" x-text="film.nameRu || film.nameOriginal || 'Без названия'"></h3>

									<!-- Год выпуска -->
									<p class="text-sm text-gray-300 mt-1" x-text="film.year + ' г.'"></p>

									<!-- Жанры (выводятся снизу под годом) -->
									<p class="text-xs text-neutral-400 mt-1 truncate" x-text="film.cleanGenres"></p>

								</div>
							</a>
						</template>

					</div>
				</section>

				<!-- CARTOONS SECTION -->
				<section class="container mx-auto px-4 py-10">
					<!-- Стрелочки ведут на нашу универсальную страницу каталога -->
					<a href="category.html?cat=cartoons" class="group flex w-fit items-center gap-1 mb-6 text-2xl font-bold hover:opacity-80 transition-all duration-300">
						Мультфильмы
						<ul class="relative flex transition-all duration-500 group-hover:translate-x-1">
							<li class="font-medium text-neutral-600">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-500 group-hover:translate-x-3 group-hover:opacity-60">&gt;</li>
							<li class="absolute font-medium text-neutral-600 opacity-0 transition-all duration-700 group-hover:translate-x-6 group-hover:opacity-40">&gt;</li>
						</ul>
					</a>

					<div class="grid grid-cols-5 gap-6">
						<!-- Перебираем массив movies из скрипта home.js -->
						<template x-for="film in cartoons" :key="film.kinopoiskId">
							<!-- Обернули в тег <a> для возможности перехода на страницу фильма -->
							<a :href="'movie.html?id=' + film.kinopoiskId" class="group relative aspect-[2/3] cursor-pointer overflow-hidden rounded-xl shadow-2xl transition-all duration-500 hover:-translate-y-3 hover:ring-4 hover:ring-inset hover:ring-white/20">
								
								<!-- Постер фильма -->
								<img :src="film.posterUrlPreview || 'images/no_poster.png'" :alt="film.nameRu" @error="event.target.src='images/no_poster.png'" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">

								<!-- Левая верхняя плашка: Тип (Фильм / Сериал) -->
								<div class="absolute left-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm">
									<span x-text="film.cleanType"></span>
								</div>

								<!-- Правая верхняя плашка: Рейтинг -->
								<div class="absolute right-3 top-3 rounded-lg backdrop-blur bg-black/50 px-2 py-1 text-sm font-bold">
									<span x-text="film.cleanRating"></span>
								</div>

								<!-- Затемнение при наведении -->
								<div class="absolute inset-0 bg-linear-to-t from-black via-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100"></div>

								<!-- Текстовый блок, выплывающий снизу -->
								<div class="relative flex h-full flex-col justify-end p-4 text-center opacity-0 transition-all duration-500 group-hover:opacity-100">

									<!-- Название фильма -->
									<h3 class="text-lg font-bold leading-tight" x-text="film.nameRu || film.nameOriginal || 'Без названия'"></h3>

									<!-- Год выпуска -->
									<p class="text-sm text-gray-300 mt-1" x-text="film.year + ' г.'"></p>

									<!-- Жанры (выводятся снизу под годом) -->
									<p class="text-xs text-neutral-400 mt-1 truncate" x-text="film.cleanGenres"></p>

								</div>
							</a>
						</template>

					</div>
				</section>
			</div>
		</template>

	</main>

	<footer class="border-t border-white/10 py-10 text-center text-gray-500">
		&copy; 2026 VHSka. Все права защищены.
	</footer>

	<!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ: строго в таком порядке для соблюдения зависимостей переменных -->
	<script src="./js/config.js"></script>
	<script src="./js/home.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</body>
</html>
